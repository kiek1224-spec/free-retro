<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Retro Emulator (Fixed Engine Build)</title>
    <style>
        body,
        html {
            height: 100%;
            background: black;
            margin: 0;
            overflow: hidden;
        }

        #cheat-sheet {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #aaa;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-family: sans-serif;
            z-index: 99999;
            display: none;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #cheat-sheet span {
            color: #fff;
            font-weight: bold;
            margin-right: 10px;
        }

        #control-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100000;
            display: flex;
            gap: 8px;
        }

        .db-btn {
            background: #0061ff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 13px;
            transition: background 0.2s;
        }

        .db-btn:hover {
            background: #004bce;
        }

        .db-btn.connected {
            background: #42b883;
            cursor: default;
        }

        .db-disconnect-btn {
            background: #e04141;
            color: white;
            display: none;
        }

        .db-disconnect-btn:hover {
            background: #c03434;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .upload-area {
            border: 2px dashed #444;
            padding: 60px 40px;
            border-radius: 12px;
            background: #1a1a1a;
            text-align: center;
            cursor: pointer;
            min-width: 320px;
        }

        .upload-area.dragover {
            border-color: #00f0ff;
            background: #252525;
        }

        #game-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }

        #game-container {
            width: 100% !important;
            height: 100% !important;
            margin: 0 auto;
        }

        #cloud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            z-index: 999999;
        }

        .retro-gray {
            filter: grayscale(1) !important;
        }

        .night-mode {
            filter: brightness(0.4) !important;
        }

        .retro-43 {
            aspect-ratio: 4 / 3 !important;
            width: auto !important;
            height: 100% !important;
        }
    </style>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
</head>
<body>

    <div id="control-panel">
        <button id="db-connect-btn" class="db-btn">🔗 Dropbox 연결하기</button>
        <button id="db-disconnect-btn" class="db-btn db-disconnect-btn">❌ 연결 끊기</button>
    </div>

    <div id="cloud-overlay">☁️ 클라우드 데이터를 동기화 중입니다...</div>

    <div id="cheat-sheet">
        <span>F1</span> 실시간 세이브 | <span>ESC</span> 게임 종료(자동백업) | <span>F</span> 전체화면 | <span>G</span> 흑백 | <span>N</span> 야간모드 | <span>B</span> 4:3
    </div>

    <div id="app">
        <div id="drop-zone" class="upload-area">
            <h1>나만의 레트로 게임기</h1>
            <p>롬 파일을 드래그하거나 클릭하세요</p>
            <input type="file" id="file-input" hidden accept=".nes,.sfc,.smc,.gb,.gbc,.gba" />
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game-container"></div>
    </div>
<script>
        console.log("[RETRO-CONTROL] 통합 브릿지 제어 탑 탑승 완료.");
        const DROPBOX_APP_KEY = 'mxdgeyz3f1eq5nm';

        let isGray = false, isNight = false, isRatio43 = false, isGameRunning = false;
        let currentRomName = 'retro_game', dbx = null, dropboxToken = localStorage.getItem('db_token');

        // 💡 세이브 파일 저장소
        let savedStateData = null;
        let savedSrmData = null;

        const gameWrapper = document.getElementById('game-wrapper');
        const gameContainer = document.getElementById('game-container');
        const cheatSheet = document.getElementById('cheat-sheet');
        const dropZone = document.getElementById('drop-zone');
        const dbConnectBtn = document.getElementById('db-connect-btn');
        const dbDisconnectBtn = document.getElementById('db-disconnect-btn');
        const cloudOverlay = document.getElementById('cloud-overlay');

        function initDropbox() {
            if (window.location.hash) {
                const params = new URLSearchParams(window.location.hash.substring(1));
                const token = params.get('access_token');
                if (token) { 
                    localStorage.setItem('db_token', token); 
                    dropboxToken = token; 
                    window.location.hash = ''; 
                }
            }
            if (dropboxToken) {
                dbx = new Dropbox.Dropbox({ accessToken: dropboxToken });
                window.dbx = dbx;
                dbConnectBtn.innerText = '☁️ Dropbox 연동 완료';
                dbConnectBtn.classList.add('connected');
                dbConnectBtn.disabled = true;
                dbDisconnectBtn.style.display = 'block';
                console.log("[DROPBOX] Dropbox 연결됨");
            } else {
                dbConnectBtn.innerText = '🔗 Dropbox 연결하기';
                dbConnectBtn.classList.remove('connected');
                dbConnectBtn.disabled = false;
                dbDisconnectBtn.style.display = 'none';
                console.log("[DROPBOX] Dropbox 미연결 - 로컬 저장만 사용");
            }
        }

        dbConnectBtn.addEventListener('click', () => {
            if (!dropboxToken) {
                window.location.href = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}`;
            }
        });

        dbDisconnectBtn.addEventListener('click', () => {
            if (confirm("Dropbox 연결을 해제하시겠습니까?")) {
                localStorage.removeItem('db_token');
                dropboxToken = null; 
                dbx = null; 
                window.dbx = null;
                initDropbox();
            }
        });

        initDropbox();

        dropZone.addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            if (e.target.files?.length > 0) startEmulator(e.target.files[0]);
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); 
            dropZone.classList.remove('dragover');
            if (e.dataTransfer?.files?.length > 0) { startEmulator(e.dataTransfer.files[0]); }
        });

        // ✅ 파일 저장 함수 - 브라우저 다운로드
        function downloadFile(data, filename) {
            const blob = new Blob([data], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            console.log(`[SAVE] 파일 저장 완료: ${filename}`);
        }

        // ✅ Dropbox 업로드 함수
        async function uploadToDropbox(filename, data) {
            if (!dbx) {
                console.log(`[DROPBOX] Dropbox 미연결 - ${filename} 업로드 스킵`);
                return false;
            }

            try {
                await dbx.filesUpload({ 
                    path: `/${filename}`, 
                    contents: data, 
                    mode: 'overwrite' 
                });
                console.log(`[DROPBOX] 업로드 성공: ${filename}`);
                return true;
            } catch (err) {
                console.error(`[DROPBOX] 업로드 실패 (${filename}):`, err);
                return false;
            }
        }

        // ✅ 날짜-시간 형식 생성
        function getTimestamp() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}${month}${day}-${hours}${minutes}${seconds}`;
        }

        // ✅ F1: State 저장만
        async function handleF1Save() {
            console.log("[F1] 세이브 파일 추출 시작...");
            cloudOverlay.style.display = 'flex';
            cloudOverlay.innerText = "💾 세이브 중...";

            if (window.EJS_emulator && typeof window.EJS_emulator.saveState === 'function') {
                window.EJS_emulator.saveState();
                console.log("[F1] saveState() 호출됨");
            }

            // 세이브 데이터가 준비될 때까지 대기
            await new Promise(resolve => {
                const checkInterval = setInterval(() => {
                    if (savedStateData) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
                
                // 최대 5초 대기
                setTimeout(() => {
                    clearInterval(checkInterval);
                    resolve();
                }, 5000);
            });

            if (savedStateData) {
                const timestamp = getTimestamp();
                const stateFilename = `${currentRomName}-${timestamp}.state`;

                // 브라우저 저장
                downloadFile(savedStateData, stateFilename);

                // Dropbox 업로드
                await uploadToDropbox(stateFilename, savedStateData);

                // 최신 버전도 저장
                await uploadToDropbox(`${currentRomName}.state`, savedStateData);
            }

            cloudOverlay.style.display = 'none';
            console.log("[F1] 저장 완료!");
        }

        // ✅ ESC: State + SRM 저장 후 종료
        async function handleEscSave() {
            console.log("[ESC] 게임 종료 및 세이브 시작...");
            cloudOverlay.style.display = 'flex';
            cloudOverlay.innerText = "☁️ 게임 데이터를 저장 중입니다...";

            if (window.EJS_emulator && typeof window.EJS_emulator.saveSaveFiles === 'function') {
                window.EJS_emulator.saveSaveFiles();
                console.log("[ESC] saveSaveFiles() 호출됨");
            }

            // 세이브 데이터가 준비될 때까지 대기
            await new Promise(resolve => {
                const checkInterval = setInterval(() => {
                    if (savedStateData || savedSrmData) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
                
                // 최대 5초 대기
                setTimeout(() => {
                    clearInterval(checkInterval);
                    resolve();
                }, 5000);
            });

            // State 파일 저장
            if (savedStateData) {
                const timestamp = getTimestamp();
                const stateFilename = `${currentRomName}-${timestamp}.state`;

                // 브라우저 저장
                downloadFile(savedStateData, stateFilename);

                // Dropbox 업로드
                await uploadToDropbox(stateFilename, savedStateData);
                await uploadToDropbox(`${currentRomName}.state`, savedStateData);
            }

            // SRM 파일 저장
            if (savedSrmData) {
                const srmFilename = `${currentRomName}.srm`;

                // 브라우저 저장
                downloadFile(savedSrmData, srmFilename);

                // Dropbox 업로드
                await uploadToDropbox(srmFilename, savedSrmData);
            }

            // 세이브 완료 후 게임 종료
            setTimeout(() => {
                cloudOverlay.style.display = 'none';
                cloudOverlay.innerText = "☁️ 클라우드 데이터를 동기화 중입니다...";
                isGameRunning = false;
                savedStateData = null;
                savedSrmData = null;
                location.reload();
            }, 2000);

            console.log("[ESC] 저장 및 종료 완료!");
        }

        async function startEmulator(file) {
            if (!file) return;
            currentRomName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            console.log(`[EMULATOR] 게임 로드: ${currentRomName}`);

            if (dbx) {
                cloudOverlay.style.display = 'flex';
                try {
                    const response = await dbx.filesDownload({ path: `/${currentRomName}.state` });
                    window.EJS_saveState = new Uint8Array(await response.result.fileBlob.arrayBuffer());
                    console.log("[EMULATOR] 클라우드 세이브 주입 완료");
                } catch (err) { 
                    console.log("[EMULATOR] 기존 세이브 없음. 새로 시작합니다."); 
                }
                cloudOverlay.style.display = 'none';
            }

            const appUi = document.getElementById('app');
            if (appUi) appUi.remove();
            document.getElementById('control-panel').style.display = 'none';
            gameWrapper.style.display = 'block';
            cheatSheet.style.display = 'block';
            setTimeout(() => { cheatSheet.style.opacity = '0'; }, 3000);

            isGameRunning = true;

            window.EJS_player = '#game-container';
            window.EJS_gameUrl = URL.createObjectURL(file);
            const ext = file.name.split('.').pop().toLowerCase();
            const coreMap = { 'nes': 'nes', 'sfc': 'snes', 'smc': 'snes', 'gb': 'gb', 'gbc': 'gb', 'gba': 'gba' };
            window.EJS_core = coreMap[ext] || 'nes';
            
            window.EJS_pathtodata = 'data/'; 
            
            window.EJS_startOnLoaded = true;
            window.EJS_ShowQuickMenu = true;
            window.EJS_gameID = currentRomName;
            window.EJS_mysavestate = true;
            window.EJS_language = 'ko-KR';

            // 🎯 State 저장 이벤트 핸들러
            window.EJS_onSaveState = function (saveData) {
                console.log("[EVENT] onSaveState 이벤트 발생!");
                if (saveData && saveData.state) {
                    savedStateData = saveData.state;
                    console.log(`[SAVE] State 데이터 캐시됨 (크기: ${saveData.state.length} bytes)`);
                }
            };

            // 🎯 SRM 저장 이벤트 핸들러
            window.EJS_onSaveSave = function (saveData) {
                console.log("[EVENT] onSaveSave 이벤트 발생!");
                if (saveData && saveData.save) {
                    savedSrmData = saveData.save;
                    console.log(`[SAVE] SRM 데이터 캐시됨 (크기: ${saveData.save.length} bytes)`);
                }
            };

            const engineHook = setInterval(() => {
                if (window.EJS_emulator?.config) {
                    window.EJS_emulator.config.enableSaveStates = true;
                    window.EJS_emulator.config.hasSaveStates = true;
                    clearInterval(engineHook);
                    console.log("[EMULATOR] 저장 상태 활성화됨");
                }
            }, 100);

            const script = document.createElement('script');
            script.src = 'data/loader.js';
            document.body.appendChild(script);           
        }

        // ✅ 키보드 이벤트 핸들러 - 개선된 버전
        const keyboardHandler = (e) => {
            if (!isGameRunning) return;

            console.log(`[KEYBOARD] 키 입력 감지: ${e.key} (Code: ${e.code})`);

            // F1: State 저장만
            if (e.key === 'F1') {
                e.preventDefault();
                e.stopPropagation();
                console.log("[KEYBOARD] F1 키 감지!");
                handleF1Save();
                return false;
            }

            // ESC: State + SRM 저장 후 종료
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                console.log("[KEYBOARD] ESC 키 감지!");
                handleEscSave();
                return false;
            }

            // 다른 기능키
            if (e.key.toLowerCase() === 'f') { 
                e.preventDefault(); 
                !document.fullscreenElement ? gameWrapper.requestFullscreen() : document.exitFullscreen(); 
            }
            if (e.key.toLowerCase() === 'g') { 
                e.preventDefault(); 
                isGray = !isGray; 
                isGray ? gameContainer.classList.add('retro-gray') : gameContainer.classList.remove('retro-gray'); 
            }
            if (e.key.toLowerCase() === 'n') { 
                e.preventDefault(); 
                isNight = !isNight; 
                isNight ? gameContainer.classList.add('night-mode') : gameContainer.classList.remove('night-mode'); 
            }
            if (e.key.toLowerCase() === 'b') { 
                e.preventDefault(); 
                isRatio43 = !isRatio43; 
                isRatio43 ? gameContainer.classList.add('retro-43') : gameContainer.classList.remove('retro-43'); 
            }
        };

        // 글로벌 키보드 리스너 등록
        window.addEventListener('keydown', keyboardHandler, { capture: true, passive: false });
        console.log("[INIT] 키보드 핸들러 등록 완료");

        // ⚡ 에뮬레이터 키보드 독점 모드 해제
        setInterval(() => {
            if (isGameRunning && window.EJS_emulator) {
                if (typeof window.EJS_emulator.setKeyboardEnabled === 'function' && !window.EJS_emulator.setKeyboardEnabled.isHooked) {
                    const originalSetKeyboard = window.EJS_emulator.setKeyboardEnabled;
                    
                    window.EJS_emulator.setKeyboardEnabled = function(enabled) {
                        originalSetKeyboard.call(window.EJS_emulator, false);
                    };
                    window.EJS_emulator.setKeyboardEnabled.isHooked = true;
                    console.log("[EMULATOR] 키보드 독점 모드 해제 완료");
                }
            }
        }, 1000);
    </script>
</body>
</html>
