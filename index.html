<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Retro Emulator (Slim Build)</title>
    <style>
        body, html { height: 100%; background: black; margin: 0; overflow: hidden; }
        #cheat-sheet {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75); color: #aaa; padding: 8px 18px;
            border-radius: 20px; font-size: 12px; font-family: sans-serif;
            z-index: 99999; display: none; white-space: nowrap;
        }
        #cheat-sheet span { color: #fff; font-weight: bold; margin-right: 10px; }
        #control-panel { position: absolute; top: 15px; right: 15px; z-index: 100000; display: flex; gap: 8px; }
        .db-btn { background: #0061ff; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .db-btn.connected { background: #42b883; cursor: default; }
        .db-disconnect-btn { background: #e04141; color: white; display: none; }
        #app { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; position: absolute; top: 0; left: 0; z-index: 10; }
        .upload-area { border: 2px dashed #444; padding: 60px 40px; border-radius: 12px; background: #1a1a1a; text-align: center; cursor: pointer; min-width: 320px; }
        .upload-area.dragover { border-color: #00f0ff; background: #252525; }
        #game-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 1; }
        #game-container { width: 100% !important; height: 100% !important; margin: 0 auto; }
        #cloud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; color: white; font-family: sans-serif; font-size: 20px; font-weight: bold; z-index: 999999; }
        .retro-gray { filter: grayscale(1) !important; }
        .night-mode { filter: brightness(0.4) !important; }
        .retro-43 { aspect-ratio: 4 / 3 !important; width: auto !important; height: 100% !important; }
    </style>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
</head>
<body>

    <div id="control-panel">
        <button id="db-connect-btn" class="db-btn">🔗 Dropbox 연결하기</button>
        <button id="db-disconnect-btn" class="db-btn db-disconnect-btn">❌ 연결 끊기</button>
    </div>

    <div id="cloud-overlay">☁️ 클라우드 데이터를 동기화 중입니다...</div>

    <div id="cheat-sheet">
        <span>F1</span> 실시간 세이브 | <span>ESC</span> 게임 종료(자동백업) | <span>F</span> 전체화면 | <span>G</span> 흑백 | <span>N</span> 야간모드 | <span>B</span> 4:3
    </div>

    <div id="app">
        <div id="drop-zone" class="upload-area">
            <h1>나만의 레트로 게임기</h1>
            <p>롬 파일을 드래그하거나 클릭하세요</p>
            <input type="file" id="file-input" hidden accept=".nes,.sfc,.smc,.gb,.gbc,.gba" />
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game-container"></div>
    </div>

    <script>
           console.log("[SYSTEM] 통합 키보드 가로채기 엔진 가동 완료.");
    const DROPBOX_APP_KEY = 'mxdgeyz3f1eq5nm';
    let isGray = false, isNight = false, isRatio43 = false, isGameRunning = false;
    let currentRomName = 'retro_game', dbx = null, dropboxToken = localStorage.getItem('db_token');

    const gameWrapper = document.getElementById('game-wrapper');
    const gameContainer = document.getElementById('game-container');
    const cheatSheet = document.getElementById('cheat-sheet');
    const dropZone = document.getElementById('drop-zone');
    const dbConnectBtn = document.getElementById('db-connect-btn');
    const dbDisconnectBtn = document.getElementById('db-disconnect-btn');
    const cloudOverlay = document.getElementById('cloud-overlay');

    // ==========================================
    // 🎯 [최우선 단일 가로채기 핸들러] F1 / ESC 
    // ==========================================
    const keyboardInterceptor = function(e) {
        if (!isGameRunning) return;

        // 1. F1 핸들러 (실시간 세이브 및 드롭박스 동기화)
        if (e.key === 'F1' || e.code === 'F1') {
            e.preventDefault();
            e.stopPropagation();
            console.log("🔥 [콘솔출력] F1 키 감지 -> GameManager 실시간 세이브 트리거");
            
            if (window.EJS_gameManagerInstance && typeof window.EJS_gameManagerInstance.screenshotAndSave === 'function') {
                window.EJS_gameManagerInstance.screenshotAndSave();
            } else {
                console.warn("⚠️ [SYSTEM] GameManager 인스턴스가 준비되지 않았거나 함수가 없습니다.");
            }
        }

        // 2. ESC 핸들러 (세이브 후 안전 종료 및 새로고침)
        if (e.key === 'Escape' || e.code === 'Escape') {
            e.preventDefault();
            e.stopPropagation();
            console.log("🔥 [콘솔출력] ESC 키 감지 -> 종료 및 클라우드 업로드 진입");
            
            cloudOverlay.style.display = 'flex';
            cloudOverlay.innerText = "☁️ 스냅샷 및 게임 데이터를 클라우드에 안전하게 저장 중입니다...";
            
            if (window.EJS_gameManagerInstance && typeof window.EJS_gameManagerInstance.escapeAndSave === 'function') {
                window.EJS_gameManagerInstance.escapeAndSave();
            } else {
                console.warn("⚠️ [SYSTEM] GameManager 인스턴스가 준비되지 않아 강제 새로고침을 실행합니다.");
                setTimeout(() => { location.reload(); }, 1500);
            }
        }

        // 3. 화면 효과 단축키 (F, G, N, B)
        if (e.key.toLowerCase() === 'f') { e.preventDefault(); !document.fullscreenElement ? gameWrapper.requestFullscreen() : document.exitFullscreen(); }
        if (e.key.toLowerCase() === 'g') { e.preventDefault(); isGray = !isGray; isGray ? gameContainer.classList.add('retro-gray') : gameContainer.classList.remove('retro-gray'); }
        if (e.key.toLowerCase() === 'n') { e.preventDefault(); isNight = !isNight; isNight ? gameContainer.classList.add('night-mode') : gameContainer.classList.remove('night-mode'); }
        if (e.key.toLowerCase() === 'b') { e.preventDefault(); isRatio43 = !isRatio43; isRatio43 ? gameContainer.classList.add('retro-43') : gameContainer.classList.remove('retro-43'); }
    };

    // Window와 Document 양쪽에 { capture: true } 옵션을 주어 에뮬레이터 캔버스보다 최우선으로 키를 가로챕니다.
    window.addEventListener('keydown', keyboardInterceptor, { capture: true, passive: false });
    document.addEventListener('keydown', keyboardInterceptor, { capture: true, passive: false });


    // ☁️ 드롭박스 연동 로직
    function initDropbox() {
        if (window.location.hash) {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const token = params.get('access_token');
            if (token) { localStorage.setItem('db_token', token); dropboxToken = token; window.location.hash = ''; }
        }
        if (dropboxToken) {
            dbx = new Dropbox.Dropbox({ accessToken: dropboxToken });
            window.dbx = dbx; // 전역 바인딩으로 GameManager에서 접근 가능하게 설정
            dbConnectBtn.innerText = '☁️ Dropbox 연동 완료';
            dbConnectBtn.classList.add('connected');
            dbConnectBtn.disabled = true;
            dbDisconnectBtn.style.display = 'block';
        }
    }
    dbConnectBtn.addEventListener('click', () => { if (!dropboxToken) window.location.href = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}`; });
    dbDisconnectBtn.addEventListener('click', () => { if (confirm("Dropbox 연결을 해제하시겠습니까?")) { localStorage.removeItem('db_token'); location.reload(); } });
    initDropbox();

    // 🖱️ 드래그 앤 드롭 및 클릭 파일 업로드 지원
    dropZone.addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('file-input').addEventListener('change', (e) => { if (e.target.files?.length > 0) startEmulator(e.target.files[0]); });
    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => e.preventDefault());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer?.files?.length > 0) startEmulator(e.dataTransfer.files[0]); });

    // 🎮 에뮬레이터 가동 함수
    async function startEmulator(file) {
        if (!file) return;
        currentRomName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;

        if (dbx) {
            cloudOverlay.style.display = 'flex';
            cloudOverlay.innerText = "☁️ 클라우드에서 세이브 파일을 로드 중입니다...";
            try {
                const response = await dbx.filesDownload({ path: `/${currentRomName}.state` });
                window.EJS_saveState = new Uint8Array(await response.result.fileBlob.arrayBuffer());
                console.log("클라우드 세이브 주입 완료");
            } catch (err) { console.log("기존 세이브 없음. 새로 시작합니다."); }
            cloudOverlay.style.display = 'none';
        }

        document.getElementById('app').remove();
        document.getElementById('control-panel').style.display = 'none';
        gameWrapper.style.display = 'block';
        cheatSheet.style.display = 'block';
        setTimeout(() => { cheatSheet.style.display = 'none'; }, 3000);

        isGameRunning = true;

        window.EJS_player = '#game-container';
        window.EJS_gameUrl = URL.createObjectURL(file);
        const ext = file.name.split('.').pop().toLowerCase();
        const coreMap = { 'nes': 'nes', 'sfc': 'snes', 'smc': 'snes', 'gb': 'gb', 'gbc': 'gb', 'gba': 'gba' };
        window.EJS_core = coreMap[ext] || 'nes';
        window.EJS_pathtodata = 'data/'; 
        window.EJS_startOnLoaded = true;
        window.EJS_gameID = currentRomName;
        window.EJS_mysavestate = true;

        // ✅ 게임 시작 시 GameManager에 커스텀 메서드 주입
    window.EJS_onGameStart = function() {
        const gm = window.EJS_emulator && window.EJS_emulator.gameManager;
        if (!gm) { console.warn("⚠️ GameManager 없음"); return; }

        gm.getTimestamp = function() {
            const n = new Date();
            return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}-${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}`;
        };

        gm.downloadFile = function(data, filename) {
            const url = URL.createObjectURL(new Blob([data], {type:"application/octet-stream"}));
            const a = document.createElement("a");
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 20000);
            console.log(`📥 다운로드: ${filename}`);
        };

        gm.uploadToDropbox = async function(filename, data) {
            if (!window.dbx) return;
            try {
                await window.dbx.filesUpload({path:`/${filename}`, contents:data, mode:'overwrite'});
                console.log(`✅ [Dropbox] ${filename}`);
            } catch(e) { console.error("❌ Dropbox 업로드 실패:", e); }
        };

        // F1: 스테이트 세이브
        gm.screenshotAndSave = function() {
            try {
                const rawState = this.getState();
                if (!rawState || rawState.length === 0) { console.warn("⚠️ State 없음"); return; }
                const romName = window.EJS_gameID || "retro_game";
                const ts = this.getTimestamp();
                this.downloadFile(rawState, `${romName}-${ts}.state`);
                this.uploadToDropbox(`${romName}.state`, rawState);
                this.uploadToDropbox(`${romName}-${ts}.state`, rawState);
                console.log("✅ F1 세이브 완료!");
            } catch(e) { console.error("❌ F1 에러:", e); }
        };

        // ESC: 백업 후 종료
        gm.escapeAndSave = function() {
            try {
                const rawState = this.getState();
                const romName = window.EJS_gameID || "retro_game";
                const ts = this.getTimestamp();
                if (rawState && rawState.length > 0) {
                    this.downloadFile(rawState, `${romName}-${ts}.state`);
                    this.uploadToDropbox(`${romName}.state`, rawState);
                }
                const srmData = this.getSaveFile(true);
                if (srmData) {
                    setTimeout(() => this.downloadFile(srmData, `${romName}.srm`), 800);
                    this.uploadToDropbox(`${romName}.srm`, srmData);
                }
                setTimeout(() => location.reload(), 2000);
            } catch(e) { console.error("❌ ESC 에러:", e); location.reload(); }
        };

        // SRM 아이콘: 파일명 수정
        gm.saveSaveFiles = function() {
            this.functions.saveSaveFiles();
            const saveData = this.getSaveFile(false);
            if (saveData && saveData.length > 0) {
                const romName = window.EJS_gameID || "retro_game";
                this.downloadFile(saveData, `${romName}.srm`);
                this.uploadToDropbox(`${romName}.srm`, saveData);
            }
        };

        window.EJS_gameManagerInstance = gm;
        console.log("✅ [SYSTEM] GameManager 커스텀 메서드 주입 완료!");
    };

        // 기본 오토세이브 발생 시 로컬 다운로드 연동
        window.EJS_onSaveState = function (saveData) {
            if (!saveData || !saveData.state) return;
            console.log("[SYSTEM] 에뮬레이터가 정상 스냅샷 데이터를 추출했습니다.");

            const blob = new Blob([saveData.state], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = `${currentRomName}.state`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        const script = document.createElement('script');
        script.src = 'data/loader.js';
        document.body.appendChild(script);           
    }
    </script>
</body>
</html>
