<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Retro Emulator (Fixed Engine Build)</title>
    <style>
        body,
        html {
            height: 100%;
            background: black;
            margin: 0;
            overflow: hidden;
        }

        #cheat-sheet {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #aaa;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-family: sans-serif;
            z-index: 99999;
            display: none;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #cheat-sheet span {
            color: #fff;
            font-weight: bold;
            margin-right: 10px;
        }

        #control-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100000;
            display: flex;
            gap: 8px;
        }

        .db-btn {
            background: #0061ff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 13px;
            transition: background 0.2s;
        }

        .db-btn:hover {
            background: #004bce;
        }

        .db-btn.connected {
            background: #42b883;
            cursor: default;
        }

        .db-disconnect-btn {
            background: #e04141;
            color: white;
            display: none;
        }

        .db-disconnect-btn:hover {
            background: #c03434;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .upload-area {
            border: 2px dashed #444;
            padding: 60px 40px;
            border-radius: 12px;
            background: #1a1a1a;
            text-align: center;
            cursor: pointer;
            min-width: 320px;
        }

        .upload-area.dragover {
            border-color: #00f0ff;
            background: #252525;
        }

        #game-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }

        #game-container {
            width: 100% !important;
            height: 100% !important;
            margin: 0 auto;
        }

        #cloud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            z-index: 999999;
        }

        .retro-gray {
            filter: grayscale(1) !important;
        }

        .night-mode {
            filter: brightness(0.4) !important;
        }

        .retro-43 {
            aspect-ratio: 4 / 3 !important;
            width: auto !important;
            height: 100% !important;
        }
    </style>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
</head>
<body>

    <div id="control-panel">
        <button id="db-connect-btn" class="db-btn">🔗 Dropbox 연결하기</button>
        <button id="db-disconnect-btn" class="db-btn db-disconnect-btn">❌ 연결 끊기</button>
    </div>

    <div id="cloud-overlay">☁️ 클라우드 데이터를 동기화 중입니다...</div>

    <div id="cheat-sheet">
        <span>F1</span> 실시간 세이브 | <span>ESC</span> 게임 종료(자동백업) | <span>F</span> 전체화면 | <span>G</span> 흑백 | <span>N</span> 야간모드 | <span>B</span> 4:3
    </div>

    <div id="app">
        <div id="drop-zone" class="upload-area">
            <h1>나만의 레트로 게임기</h1>
            <p>롬 파일을 드래그하거나 클릭하세요</p>
            <input type="file" id="file-input" hidden accept=".nes,.sfc,.smc,.gb,.gbc,.gba" />
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game-container"></div>
    </div>
<script>
        console.log("[RETRO-CONTROL] 통합 브릿지 제어 탑 탑승 완료.");
        const DROPBOX_APP_KEY = 'mxdgeyz3f1eq5nm';

        let isGray = false, isNight = false, isRatio43 = false, isGameRunning = false;
        let currentRomName = 'retro_game', dbx = null, dropboxToken = localStorage.getItem('db_token');

        const gameWrapper = document.getElementById('game-wrapper');
        const gameContainer = document.getElementById('game-container');
        const cheatSheet = document.getElementById('cheat-sheet');
        const dropZone = document.getElementById('drop-zone');
        const dbConnectBtn = document.getElementById('db-connect-btn');
        const dbDisconnectBtn = document.getElementById('db-disconnect-btn');
        const cloudOverlay = document.getElementById('cloud-overlay');

        function initDropbox() {
            if (window.location.hash) {
                const params = new URLSearchParams(window.location.hash.substring(1));
                const token = params.get('access_token');
                if (token) { 
                    localStorage.setItem('db_token', token); 
                    dropboxToken = token; 
                    window.location.hash = ''; 
                }
            }
            if (dropboxToken) {
                dbx = new Dropbox.Dropbox({ accessToken: dropboxToken });
                window.dbx = dbx;
                dbConnectBtn.innerText = '☁️ Dropbox 연동 완료';
                dbConnectBtn.classList.add('connected');
                dbConnectBtn.disabled = true;
                dbDisconnectBtn.style.display = 'block';
                console.log("[DROPBOX] Dropbox 연결됨");
            } else {
                dbConnectBtn.innerText = '🔗 Dropbox 연결하기';
                dbConnectBtn.classList.remove('connected');
                dbConnectBtn.disabled = false;
                dbDisconnectBtn.style.display = 'none';
                console.log("[DROPBOX] Dropbox 미연결 - 로컬 저장만 사용");
            }
        }

        dbConnectBtn.addEventListener('click', () => {
            if (!dropboxToken) {
                window.location.href = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}`;
            }
        });

        dbDisconnectBtn.addEventListener('click', () => {
            if (confirm("Dropbox 연결을 해제하시겠습니까?")) {
                localStorage.removeItem('db_token');
                dropboxToken = null; 
                dbx = null; 
                window.dbx = null;
                initDropbox();
            }
        });

        initDropbox();

        dropZone.addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            if (e.target.files?.length > 0) startEmulator(e.target.files[0]);
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); 
            dropZone.classList.remove('dragover');
            if (e.dataTransfer?.files?.length > 0) { startEmulator(e.dataTransfer.files[0]); }
        });

        // ✅ 파일 브라우저 다운로드 함수
        function downloadFile(data, filename) {
            const blob = new Blob([data], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            console.log(`[SAVE] 브라우저 저장 완료: ${filename}`);
        }

        // ✅ Dropbox 업로드 함수
        async function uploadToDropbox(filename, data) {
            if (!dbx) {
                console.log(`[DROPBOX] Dropbox 미연결 - ${filename} 업로드 스킵`);
                return false;
            }

            try {
                await dbx.filesUpload({ 
                    path: `/${filename}`, 
                    contents: data, 
                    mode: 'overwrite' 
                });
                console.log(`[DROPBOX] 업로드 성공: ${filename}`);
                return true;
            } catch (err) {
                console.error(`[DROPBOX] 업로드 실패 (${filename}):`, err);
                return false;
            }
        }

        // ✅ 날짜-시간 형식 생성
        function getTimestamp() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}${month}${day}-${hours}${minutes}${seconds}`;
        }

        // ✅ 에뮬레이터 메모리에서 State 추출
        function extractState() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.saveState) {
                    console.log("[EXTRACT] State 추출 시작...");
                    
                    // 에뮬레이터에서 현재 상태를 메모리에 저장
                    if (typeof window.EJS_emulator.getCurrentState === 'function') {
                        const state = window.EJS_emulator.getCurrentState();
                        if (state) {
                            console.log(`[EXTRACT] State 추출 성공 (크기: ${state.length || state.byteLength} bytes)`);
                            return state;
                        }
                    }
                    
                    // 대체 방법: saveState 호출 후 콜백 대기
                    return new Promise(resolve => {
                        let stateData = null;
                        const originalCallback = window.EJS_onSaveState;
                        
                        window.EJS_onSaveState = function(data) {
                            stateData = data?.state;
                            if (originalCallback) originalCallback(data);
                        };
                        
                        window.EJS_emulator.saveState();
                        
                        // 500ms 대기
                        setTimeout(() => {
                            window.EJS_onSaveState = originalCallback;
                            if (stateData) {
                                console.log(`[EXTRACT] State 추출 성공 (크기: ${stateData.length || stateData.byteLength} bytes)`);
                                resolve(stateData);
                            } else {
                                console.warn("[EXTRACT] State 추출 실패 - 데이터 없음");
                                resolve(null);
                            }
                        }, 500);
                    });
                }
            } catch (e) {
                console.error("[EXTRACT] State 추출 중 오류:", e);
            }
            return null;
        }

        // ✅ 에뮬레이터 메모리에서 SRM 추출
        function extractSRM() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.saveSaveFiles) {
                    console.log("[EXTRACT] SRM 추출 시작...");
                    
                    return new Promise(resolve => {
                        let srmData = null;
                        const originalCallback = window.EJS_onSaveSave;
                        
                        window.EJS_onSaveSave = function(data) {
                            srmData = data?.save;
                            if (originalCallback) originalCallback(data);
                        };
                        
                        window.EJS_emulator.saveSaveFiles();
                        
                        // 500ms 대기
                        setTimeout(() => {
                            window.EJS_onSaveSave = originalCallback;
                            if (srmData) {
                                console.log(`[EXTRACT] SRM 추출 성공 (크기: ${srmData.length || srmData.byteLength} bytes)`);
                                resolve(srmData);
                            } else {
                                console.warn("[EXTRACT] SRM 추출 실패 - 데이터 없음");
                                resolve(null);
                            }
                        }, 500);
                    });
                }
            } catch (e) {
                console.error("[EXTRACT] SRM 추출 중 오류:", e);
            }
            return null;
        }

        // ✅ F1: 게임 화면 그대로 두고 State만 다운로드 + Dropbox 업로드
        async function handleF1Save() {
            console.log("[F1] State 저장 시작...");
            
            try {
                const stateData = await extractState();
                
                if (stateData) {
                    const timestamp = getTimestamp();
                    const stateFilename = `${currentRomName}-${timestamp}.state`;

                    // 1. 브라우저 저장 (우선순위 1)
                    downloadFile(stateData, stateFilename);

                    // 2. Dropbox 업로드 (우선순위 2)
                    await uploadToDropbox(stateFilename, stateData);
                    await uploadToDropbox(`${currentRomName}.state`, stateData);

                    console.log("[F1] State 저장 완료!");
                } else {
                    console.warn("[F1] State 데이터를 가져올 수 없습니다");
                }
            } catch (e) {
                console.error("[F1] 저장 중 오류:", e);
            }
        }

        // ✅ ESC: State + SRM 저장 후 게임 종료
        async function handleEscSave() {
            console.log("[ESC] 게임 종료 및 세이브 시작...");
            cloudOverlay.style.display = 'flex';
            cloudOverlay.innerText = "☁️ 게임 데이터를 저장 중입니다...";
            isGameRunning = false;

            try {
                // 동시에 State와 SRM 추출
                const [stateData, srmData] = await Promise.all([
                    extractState(),
                    extractSRM()
                ]);

                // State 저장
                if (stateData) {
                    const timestamp = getTimestamp();
                    const stateFilename = `${currentRomName}-${timestamp}.state`;

                    // 1. 브라우저 저장
                    downloadFile(stateData, stateFilename);

                    // 2. Dropbox 업로드
                    await uploadToDropbox(stateFilename, stateData);
                    await uploadToDropbox(`${currentRomName}.state`, stateData);
                }

                // SRM 저장
                if (srmData) {
                    const srmFilename = `${currentRomName}.srm`;

                    // 1. 브라우저 저장
                    downloadFile(srmData, srmFilename);

                    // 2. Dropbox 업로드
                    await uploadToDropbox(srmFilename, srmData);
                }

                console.log("[ESC] 저장 완료! 게임을 종료합니다.");
                
                // 게임 종료
                setTimeout(() => {
                    cloudOverlay.style.display = 'none';
                    location.reload();
                }, 1500);

            } catch (e) {
                console.error("[ESC] 저장 중 오류:", e);
                cloudOverlay.style.display = 'none';
                location.reload();
            }
        }

        async function startEmulator(file) {
            if (!file) return;
            currentRomName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            console.log(`[EMULATOR] 게임 로드: ${currentRomName}`);

            if (dbx) {
                cloudOverlay.style.display = 'flex';
                try {
                    const response = await dbx.filesDownload({ path: `/${currentRomName}.state` });
                    window.EJS_saveState = new Uint8Array(await response.result.fileBlob.arrayBuffer());
                    console.log("[EMULATOR] 클라우드 세이브 주입 완료");
                } catch (err) { 
                    console.log("[EMULATOR] 기존 세이브 없음. 새로 시작합니다."); 
                }
                cloudOverlay.style.display = 'none';
            }

            const appUi = document.getElementById('app');
            if (appUi) appUi.remove();
            document.getElementById('control-panel').style.display = 'none';
            gameWrapper.style.display = 'block';
            cheatSheet.style.display = 'block';
            setTimeout(() => { cheatSheet.style.opacity = '0'; }, 3000);

            isGameRunning = true;

            window.EJS_player = '#game-container';
            window.EJS_gameUrl = URL.createObjectURL(file);
            const ext = file.name.split('.').pop().toLowerCase();
            const coreMap = { 'nes': 'nes', 'sfc': 'snes', 'smc': 'snes', 'gb': 'gb', 'gbc': 'gb', 'gba': 'gba' };
            window.EJS_core = coreMap[ext] || 'nes';
            
            window.EJS_pathtodata = 'data/'; 
            
            window.EJS_startOnLoaded = true;
            window.EJS_ShowQuickMenu = true;
            window.EJS_gameID = currentRomName;
            window.EJS_mysavestate = true;
            window.EJS_language = 'ko-KR';

            const engineHook = setInterval(() => {
                if (window.EJS_emulator?.config) {
                    window.EJS_emulator.config.enableSaveStates = true;
                    window.EJS_emulator.config.hasSaveStates = true;
                    clearInterval(engineHook);
                    console.log("[EMULATOR] 저장 상태 활성화됨");
                }
            }, 100);

            const script = document.createElement('script');
            script.src = 'data/loader.js';
            document.body.appendChild(script);           
        }

        // ✅ 키보드 이벤트 핸들러
        const keyboardHandler = (e) => {
            if (!isGameRunning) return;

            // F1: State만 저장 (게임 화면 유지)
            if (e.key === 'F1') {
                e.preventDefault();
                e.stopPropagation();
                console.log("[KEYBOARD] F1 키 감지!");
                handleF1Save();
                return false;
            }

            // ESC: State + SRM 저장 후 게임 종료
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                console.log("[KEYBOARD] ESC 키 감지!");
                handleEscSave();
                return false;
            }

            // 다른 기능키
            if (e.key.toLowerCase() === 'f') { 
                e.preventDefault(); 
                !document.fullscreenElement ? gameWrapper.requestFullscreen() : document.exitFullscreen(); 
            }
            if (e.key.toLowerCase() === 'g') { 
                e.preventDefault(); 
                isGray = !isGray; 
                isGray ? gameContainer.classList.add('retro-gray') : gameContainer.classList.remove('retro-gray'); 
            }
            if (e.key.toLowerCase() === 'n') { 
                e.preventDefault(); 
                isNight = !isNight; 
                isNight ? gameContainer.classList.add('night-mode') : gameContainer.classList.remove('night-mode'); 
            }
            if (e.key.toLowerCase() === 'b') { 
                e.preventDefault(); 
                isRatio43 = !isRatio43; 
                isRatio43 ? gameContainer.classList.add('retro-43') : gameContainer.classList.remove('retro-43'); 
            }
        };

        // 글로벌 키보드 리스너 등록
        window.addEventListener('keydown', keyboardHandler, { capture: true, passive: false });
        console.log("[INIT] 키보드 핸들러 등록 완료");

        // ⚡ 에뮬레이터 키보드 독점 모드 해제
        setInterval(() => {
            if (isGameRunning && window.EJS_emulator) {
                if (typeof window.EJS_emulator.setKeyboardEnabled === 'function' && !window.EJS_emulator.setKeyboardEnabled.isHooked) {
                    const originalSetKeyboard = window.EJS_emulator.setKeyboardEnabled;
                    
                    window.EJS_emulator.setKeyboardEnabled = function(enabled) {
                        originalSetKeyboard.call(window.EJS_emulator, false);
                    };
                    window.EJS_emulator.setKeyboardEnabled.isHooked = true;
                    console.log("[EMULATOR] 키보드 독점 모드 해제 완료");
                }
            }
        }, 1000);
    </script>
</body>
</html>
