<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Retro Emulator (Fixed Engine Build)</title>
    <style>
        body,
        html {
            height: 100%;
            background: black;
            margin: 0;
            overflow: hidden;
        }

        #cheat-sheet {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #aaa;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-family: sans-serif;
            z-index: 99999;
            display: none;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #cheat-sheet span {
            color: #fff;
            font-weight: bold;
            margin-right: 10px;
        }

        #control-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100000;
            display: flex;
            gap: 8px;
        }

        .db-btn {
            background: #0061ff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 13px;
            transition: background 0.2s;
        }

        .db-btn:hover {
            background: #004bce;
        }

        .db-btn.connected {
            background: #42b883;
            cursor: default;
        }

        .db-disconnect-btn {
            background: #e04141;
            color: white;
            display: none;
        }

        .db-disconnect-btn:hover {
            background: #c03434;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .upload-area {
            border: 2px dashed #444;
            padding: 60px 40px;
            border-radius: 12px;
            background: #1a1a1a;
            text-align: center;
            cursor: pointer;
            min-width: 320px;
        }

        .upload-area.dragover {
            border-color: #00f0ff;
            background: #252525;
        }

        #game-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }

        #game-container {
            width: 100% !important;
            height: 100% !important;
            margin: 0 auto;
        }

        #cloud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            z-index: 999999;
        }

        .retro-gray {
            filter: grayscale(1) !important;
        }

        .night-mode {
            filter: brightness(0.4) !important;
        }

        .retro-43 {
            aspect-ratio: 4 / 3 !important;
            width: auto !important;
            height: 100% !important;
        }
    </style>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
</head>
<body>

    <div id="control-panel">
        <button id="db-connect-btn" class="db-btn">🔗 Dropbox 연결하기</button>
        <button id="db-disconnect-btn" class="db-btn db-disconnect-btn">❌ 연결 끊기</button>
    </div>

    <div id="cloud-overlay">☁️ 클라우드 데이터를 동기화 중입니다...</div>

    <div id="cheat-sheet">
        <span>F1</span> 실시간 세이브 | <span>ESC</span> 게임 종료(자동백업) | <span>F</span> 전체화면 | <span>G</span> 흑백 | <span>N</span> 야간모드 | <span>B</span> 4:3
    </div>

    <div id="app">
        <div id="drop-zone" class="upload-area">
            <h1>나만의 레트로 게임기</h1>
            <p>롬 파일을 드래그하거나 클릭하세요</p>
            <input type="file" id="file-input" hidden accept=".nes,.sfc,.smc,.gb,.gbc,.gba" />
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game-container"></div>
    </div>
<script>
        console.log("[RETRO-CONTROL] 통합 브릿지 제어 탑 탑승 완료.");
        const DROPBOX_APP_KEY = 'mxdgeyz3f1eq5nm';

        let isGray = false, isNight = false, isRatio43 = false, isGameRunning = false;
        let currentRomName = 'retro_game', dbx = null, dropboxToken = localStorage.getItem('db_token');

        // 💡 전역 통신 버퍼 상태 초기화
        window.isF1Saving = false;
        window.isEscSaving = false;

        const gameWrapper = document.getElementById('game-wrapper');
        const gameContainer = document.getElementById('game-container');
        const cheatSheet = document.getElementById('cheat-sheet');
        const dropZone = document.getElementById('drop-zone');
        const dbConnectBtn = document.getElementById('db-connect-btn');
        const dbDisconnectBtn = document.getElementById('db-disconnect-btn');
        const cloudOverlay = document.getElementById('cloud-overlay');

        // 🔒 다운로드 가로채기 엔진 (SRAM 중복 배출 방어)
        const originalCreateElement = document.createElement;
        document.createElement = function (tagName, options) {
            const el = originalCreateElement.call(document, tagName, options);
            if (tagName.toLowerCase() === 'a') {
                const originalClick = el.click;
                el.click = function () {
                    if (window.isF1Saving && el.download && el.download.endsWith('.srm')) {
                        console.log(`[RETRO-CONTROL] 🛡️ F1 모드 감지: 불필요한 SRAM 배출 취소`);
                        return;
                    }
                    if (window.isEscSaving && el.download && el.download.endsWith('.srm')) {
                        console.log(`[RETRO-CONTROL] ⏱️ ESC 모드 감지: SRM 파일 800ms 딜레이 우회 발사`);
                        el.download = `${currentRomName}.srm`;
                        setTimeout(() => {
                            originalClick.call(el);
                        }, 800);
                        return;
                    }
                    if (el.download && el.download.endsWith('.srm')) {
                        el.download = `${currentRomName}.srm`;
                    }
                    originalClick.apply(el, arguments);
                };
            }
            return el;
        };

        function initDropbox() {
            if (window.location.hash) {
                const params = new URLSearchParams(window.location.hash.substring(1));
                const token = params.get('access_token');
                if (token) { localStorage.setItem('db_token', token); dropboxToken = token; window.location.hash = ''; }
            }
            if (dropboxToken) {
                dbx = new Dropbox.Dropbox({ accessToken: dropboxToken });
                window.dbx = dbx;
                dbConnectBtn.innerText = '☁️ Dropbox 연동 완료';
                dbConnectBtn.classList.add('connected');
                dbConnectBtn.disabled = true;
                dbDisconnectBtn.style.display = 'block';
            } else {
                dbConnectBtn.innerText = '🔗 Dropbox 연결하기';
                dbConnectBtn.classList.remove('connected');
                dbConnectBtn.disabled = false;
                dbDisconnectBtn.style.display = 'none';
            }
        }

        dbConnectBtn.addEventListener('click', () => {
            if (!dropboxToken) {
                window.location.href = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}`;
            }
        });

        dbDisconnectBtn.addEventListener('click', () => {
            if (confirm("Dropbox 연결을 해제하시겠습니까?")) {
                localStorage.removeItem('db_token');
                dropboxToken = null; dbx = null; window.dbx = null;
                initDropbox();
            }
        });

        initDropbox();

        dropZone.addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            if (e.target.files?.length > 0) startEmulator(e.target.files[0]);
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer?.files?.length > 0) { startEmulator(e.dataTransfer.files[0]); }
        });

        async function startEmulator(file) {
            if (!file) return;
            currentRomName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;

            if (dbx) {
                cloudOverlay.style.display = 'flex';
                try {
                    const response = await dbx.filesDownload({ path: `/${currentRomName}.state` });
                    window.EJS_saveState = new Uint8Array(await response.result.fileBlob.arrayBuffer());
                    console.log("클라우드 세이브 주입 완료");
                } catch (err) { console.log("기존 세이브 없음. 새로 시작합니다."); }
                cloudOverlay.style.display = 'none';
            }

            const appUi = document.getElementById('app');
            if (appUi) appUi.remove();
            document.getElementById('control-panel').style.display = 'none';
            gameWrapper.style.display = 'block';
            cheatSheet.style.display = 'block';
            setTimeout(() => { cheatSheet.style.opacity = '0'; }, 3000);

            isGameRunning = true;

            window.EJS_player = '#game-container';
            window.EJS_gameUrl = URL.createObjectURL(file);
            const ext = file.name.split('.').pop().toLowerCase();
            const coreMap = { 'nes': 'nes', 'sfc': 'snes', 'smc': 'snes', 'gb': 'gb', 'gbc': 'gb', 'gba': 'gba' };
            window.EJS_core = coreMap[ext] || 'nes';
            
            // 💡 깃허브 페이지 호스팅의 하위 리소스 정합성을 보장하기 위해 컨텍스트 상대 경로로 복원
            window.EJS_pathtodata = 'data/'; 
            
            window.EJS_startOnLoaded = true;
            window.EJS_ShowQuickMenu = true;
            window.EJS_gameID = currentRomName;
            window.EJS_mysavestate = true;
            window.EJS_language = 'ko-KR';

            // 💡 [추가] GameManager.js가 자식 프레임에서 ESC 신호를 던질 때 안전하게 수신할 통합 브릿지 개통
            const saveBridgeHandler = () => {
                cloudOverlay.style.display = 'flex';
                cloudOverlay.innerText = "☁️ 스냅샷 및 게임 데이터를 클라우드에 안전하게 저장 중입니다...";
                
                setTimeout(() => {
                    window.isEscSaving = false;
                    if(window.top) window.top.isEscSaving = false;
                    isGameRunning = false;
                    location.reload();
                }, 4500); // 4.5초 유예시간 확보 후 브라우저 안전 리로드
            };
            window.EJS_saveSaveFiles_Bridge = saveBridgeHandler;
            window.top.EJS_saveSaveFiles_Bridge = saveBridgeHandler;

            // F1 전역 트리거 바인딩 유지
            window.top.EJS_triggerSaveState = () => {
                if (window.EJS_emulator && typeof window.EJS_emulator.saveState === 'function') {
                    window.EJS_emulator.saveState();
                }
            };

            const engineHook = setInterval(() => {
                if (window.EJS_emulator?.config) {
                    window.EJS_emulator.config.enableSaveStates = true;
                    window.EJS_emulator.config.hasSaveStates = true;
                    clearInterval(engineHook);
                }
            }, 100);

            // 🎯 에뮬레이터 엔진에서 추출된 State 바이너리가 낙하하는 순간 처리
            window.EJS_onSaveState = function (saveData) {
                if (!saveData || !saveData.state) return;

                const now = new Date();
                const timestamp = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + "-" + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
                const targetFilename = `${currentRomName}-${timestamp}.state`;

                // 1. .state 파일 브라우저 즉시 배출
                try {
                    const blob = new Blob([saveData.state], { type: "application/octet-stream" });
                    const url = URL.createObjectURL(blob);
                    const a = originalCreateElement.call(document, "a");
                    a.href = url;
                    a.download = targetFilename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    console.log("[RETRO-CONTROL] 스테이트 파일 디스크 저장 완료");
                } catch (downloadErr) { console.error("로컬 파일 유실:", downloadErr); }

                // 2. 드롭박스 동시 업로드 전송 처리
                const activeDbx = dbx || window.dbx || (window.top && window.top.dbx);
                if (activeDbx) {
                    console.log("[RETRO-CONTROL] 드롭박스로 바이너리 병렬 전송을 가동합니다.");
                    const paths = [`/${currentRomName}.state`, `/${targetFilename}`];
                    paths.forEach(savePath => {
                        activeDbx.filesUpload({ path: savePath, contents: saveData.state, mode: 'overwrite' })
                            .then(() => console.log(`[클라우드 전송성공]: ${savePath}`))
                            .catch(e => console.error("[클라우드 실패]:", e));
                    });
                }
            };

            const script = document.createElement('script');
            script.src = 'data/loader.js';
            document.body.appendChild(script);           
        }

        // 💡 중요: 세 번째 인자 'true'를 사용하여 캡처링 모드로 선점 장악
        window.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            if (e.key.toLowerCase() === 'f') { e.preventDefault(); !document.fullscreenElement ? gameWrapper.requestFullscreen() : document.exitFullscreen(); }
            if (e.key.toLowerCase() === 'g') { e.preventDefault(); isGray = !isGray; isGray ? gameContainer.classList.add('retro-gray') : gameContainer.classList.remove('retro-gray'); }
            if (e.key.toLowerCase() === 'n') { e.preventDefault(); isNight = !isNight; isNight ? gameContainer.classList.add('night-mode') : gameContainer.classList.remove('night-mode'); }
            if (e.key.toLowerCase() === 'b') { e.preventDefault(); isRatio43 = !isRatio43; isRatio43 ? gameContainer.classList.add('retro-43') : gameContainer.classList.remove('retro-43'); }
        }, true);
    </script>
</body>
</html>
